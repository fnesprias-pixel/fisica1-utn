<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clase — Física I UTN</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#003087" />
</head>
<body class="layout-app">

  <header class="header-app">
    <div class="marca">
      <div class="logo-mini">F1</div>
      <div>
        Física I — UTN FRBA
        <div style="font-size:0.7rem;opacity:0.8;font-weight:400;">Prof. Francisco Nesprías</div>
      </div>
    </div>
    <div class="acciones">
      <span class="nombre-usuario" id="nombre-usuario"></span>
      <a href="estudiante.html" class="btn-secundario">← Volver</a>
      <button class="btn-logout" onclick="cerrarSesion()">Salir</button>
    </div>
  </header>

  <main class="contenido-principal">
    <h2 id="titulo-clase">Cargando clase…</h2>
    <div id="contenido-clase">
      <p class="cargando">Cargando contenido…</p>
    </div>
    <div id="ejercicios-clase">
      <h3>Ejercicios Propuestos</h3>
      <form id="form-ejercicios">
        <p class="cargando">Cargando ejercicios…</p>
      </form>
      <button type="submit" form="form-ejercicios" class="btn-primario" id="btn-enviar">Enviar Respuestas</button>
      <div id="resultado-correccion" hidden></div>
    </div>
  </main>

  <!-- 1. Librería Supabase desde CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <!-- 2. Crea el cliente supabase -->
  <script src="js/config.js"></script>
  <!-- 3. Funciones de autenticación y protección de rutas -->
  <script src="js/auth.js"></script>
  <!-- 4. Configura MathJax antes de cargar su CDN -->
  <script src="js/mathjax-init.js"></script>
  <!-- 5. MathJax CDN (async: se descarga en paralelo, ejecuta después de mathjax-init.js) -->
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
  <!-- 6. Lógica de la clase -->
  <script src="js/clase.js"></script>
  <!-- 7. Service worker -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
</body>
</html>
