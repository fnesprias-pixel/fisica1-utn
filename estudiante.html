<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel del estudiante — Física I UTN</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#003087" />
</head>
<body class="layout-app">

  <header class="header-app">
    <div class="marca">
      <div class="logo-mini">F1</div>
      <div>
        <span class="marca-texto">Física I — UTN FRBA</span>
        <div class="marca-sub">Prof. Francisco Nesprías</div>
      </div>
    </div>
    <div class="acciones">
      <span class="nombre-usuario" id="nombre-usuario"></span>
      <button class="btn-secundario btn-cambiar-pass-full" id="btn-cambiar-pass" style="color:#fff;border-color:rgba(255,255,255,0.4);background:rgba(255,255,255,0.1);">
        Cambiar contraseña
      </button>
      <button class="btn-secundario btn-cambiar-pass-icon" id="btn-cambiar-pass-icon" style="color:#fff;border-color:rgba(255,255,255,0.4);background:rgba(255,255,255,0.1);padding:0.35rem 0.6rem;" title="Cambiar contraseña">
        🔑
      </button>
      <button class="btn-logout" onclick="cerrarSesion()">Salir</button>
    </div>
  </header>

  <main class="contenido-principal">
    <h2 style="margin-bottom:1.25rem;">Unidades</h2>
    <div id="lista-unidades" class="lista-unidades">
      <p class="cargando">Cargando unidades…</p>
    </div>

    <hr style="margin:2rem 0;border:none;border-top:2px solid var(--borde);" />

    <!-- ===== SECCIÓN: ACTIVIDADES ===== -->
    <h2 style="margin-bottom:1.25rem;">Actividades</h2>
    <div id="lista-actividades" style="margin-bottom:2rem;">
      <p class="cargando">Cargando actividades…</p>
    </div>

    <hr style="margin:2rem 0;border:none;border-top:2px solid var(--borde);" />

    <!-- ===== SECCIÓN: MIS ENTREGAS ===== -->
    <h2 style="margin-bottom:1.25rem;">Mis entregas</h2>

    <!-- Formulario de nueva entrega -->
    <div style="background:var(--blanco);border-radius:8px;box-shadow:var(--sombra);padding:1.5rem;margin-bottom:1.5rem;">
      <h3 style="margin-bottom:1rem;">Subir ejercicio resuelto</h3>
      <form id="form-entrega">
        <div class="campo">
          <label for="entrega-titulo">Título (ej: Parcial 1 — Ejercicio 3)</label>
          <input type="text" id="entrega-titulo" placeholder="Describí brevemente qué ejercicio es" required />
        </div>
        <div class="campo">
          <label for="entrega-descripcion">Comentario opcional</label>
          <textarea id="entrega-descripcion" placeholder="¿Alguna duda sobre tu resolución?" style="min-height:60px;"></textarea>
        </div>
        <div class="campo">
          <label for="entrega-imagenes">Imágenes (podés seleccionar varias fotos)</label>
          <input type="file" id="entrega-imagenes" accept="image/*" multiple required />
          <div id="preview-imagenes" style="display:flex;flex-wrap:wrap;gap:0.5rem;margin-top:0.5rem;"></div>
        </div>
        <div id="error-entrega" class="mensaje-error" hidden></div>
        <button type="submit" class="btn-primario" id="btn-subir-entrega">Enviar entrega</button>
      </form>
    </div>

    <!-- Lista de entregas del estudiante -->
    <div style="background:var(--blanco);border-radius:8px;box-shadow:var(--sombra);padding:1.5rem;">
      <h3 style="margin-bottom:1rem;">Historial de entregas</h3>
      <div id="lista-mis-entregas">
        <p class="cargando">Cargando…</p>
      </div>
    </div>
  </main>

  <!-- Modal cambio de contraseña -->
  <div id="modal-contrasena" class="modal-overlay" hidden>
    <div class="modal-caja">
      <h3 class="modal-titulo">Cambiar contraseña</h3>

      <div id="error-pass" class="mensaje-error" hidden></div>
      <div id="exito-pass" class="mensaje-exito" hidden>Contraseña actualizada correctamente.</div>

      <div class="campo">
        <label for="nueva-pass">Nueva contraseña</label>
        <input type="password" id="nueva-pass" placeholder="Mínimo 6 caracteres" />
      </div>
      <div class="campo">
        <label for="confirmar-pass">Confirmar contraseña</label>
        <input type="password" id="confirmar-pass" placeholder="Repetí la contraseña" />
      </div>

      <div class="modal-acciones">
        <button class="btn-secundario" id="btn-cancelar-pass">Cancelar</button>
        <button class="btn-primario" id="btn-guardar-pass" style="width:auto;">Guardar</button>
      </div>
    </div>
  </div>

  <!-- 1. Librería Supabase desde CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <!-- 2. Crea el cliente supabase -->
  <script src="js/config.js"></script>
  <!-- 3. Funciones de autenticación y protección de rutas -->
  <script src="js/auth.js"></script>
  <!-- 4. Configura MathJax antes de cargar su CDN -->
  <script src="js/mathjax-init.js"></script>
  <!-- 5. MathJax CDN (async: se descarga en paralelo, ejecuta después de mathjax-init.js) -->
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
  <!-- 6. Lógica del panel del estudiante -->
  <script src="js/estudiante.js"></script>
  <!-- 7. Service worker -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
</body>
</html>
