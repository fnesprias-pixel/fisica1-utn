<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nueva contraseña — Física I UTN FRBA | Prof. Francisco Nesprías</title>
  <link rel="stylesheet" href="css/styles.css" />
  <meta name="theme-color" content="#003087" />
</head>
<body class="pagina-login">

  <main class="contenedor-login">
    <div class="login-card">

      <div class="login-logo">
        <div class="logo-icono">F<span>1</span></div>
        <h1>Física I</h1>
        <p class="login-subtitulo">UTN FRBA</p>
      </div>

      <!-- Estado: cargando sesión del link -->
      <div id="estado-cargando" style="text-align:center;padding:1rem 0;">
        <p class="cargando">Verificando enlace…</p>
      </div>

      <!-- Estado: link inválido o expirado -->
      <div id="estado-error" hidden style="text-align:center;">
        <p class="mensaje-error" style="display:block;margin-bottom:1rem;">
          El enlace es inválido o ya expiró.
        </p>
        <a href="/index.html" class="btn-primario" style="display:inline-block;width:auto;">
          Volver al inicio
        </a>
      </div>

      <!-- Estado: formulario de nueva contraseña -->
      <div id="estado-form" hidden>
        <h2 style="margin-bottom:0.25rem;font-size:1.2rem;">Nueva contraseña</h2>
        <p style="color:var(--texto-suave);font-size:0.875rem;margin-bottom:1.5rem;">
          Ingresá tu nueva contraseña para acceder a la plataforma.
        </p>

        <form id="form-nueva-pass" novalidate>
          <div class="campo">
            <label for="nueva-pass">Nueva contraseña</label>
            <input
              type="password"
              id="nueva-pass"
              placeholder="Mínimo 6 caracteres"
              autocomplete="new-password"
              required
            />
          </div>
          <div class="campo">
            <label for="confirmar-pass">Confirmar contraseña</label>
            <input
              type="password"
              id="confirmar-pass"
              placeholder="Repetí la contraseña"
              autocomplete="new-password"
              required
            />
          </div>

          <div id="error-pass" class="mensaje-error" hidden></div>

          <button type="submit" class="btn-primario" id="btn-guardar">
            Guardar contraseña
          </button>
        </form>
      </div>

      <!-- Estado: éxito -->
      <div id="estado-exito" hidden style="text-align:center;">
        <p class="mensaje-exito" style="display:block;margin-bottom:1rem;">
          ✓ Contraseña actualizada correctamente.
        </p>
        <a href="/index.html" class="btn-primario" style="display:inline-block;width:auto;">
          Ir al inicio
        </a>
      </div>

    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/config.js"></script>
  <script>
    const elCargando = document.getElementById('estado-cargando');
    const elError    = document.getElementById('estado-error');
    const elForm     = document.getElementById('estado-form');
    const elExito    = document.getElementById('estado-exito');
    const form       = document.getElementById('form-nueva-pass');
    const msgError   = document.getElementById('error-pass');
    const btnGuardar = document.getElementById('btn-guardar');

    function mostrar(id) {
      [elCargando, elError, elForm, elExito].forEach(el => el.hidden = true);
      document.getElementById(id).hidden = false;
    }

    // Supabase procesa el token del hash automáticamente al cargar
    // Esperamos el evento PASSWORD_RECOVERY o verificamos la sesión
    supabase.auth.onAuthStateChange(async (event, session) => {
      if (event === 'PASSWORD_RECOVERY') {
        // El usuario llegó desde el link del mail — mostrar formulario
        mostrar('estado-form');
      } else if (event === 'SIGNED_IN' && session) {
        // Ya tiene sesión activa pero no es reset — redirigir
        const { data: perfil } = await supabase
          .from('usuarios').select('rol').eq('id', session.user.id).single();
        window.location.href = perfil?.rol === 'docente' ? '/docente.html' : '/estudiante.html';
      }
    });

    // Timeout: si en 3s no llegó ningún evento, el link es inválido
    setTimeout(() => {
      if (!elForm.hidden || !elExito.hidden) return;
      mostrar('estado-error');
    }, 3000);

    // Envío del formulario
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      msgError.hidden = true;

      const nueva     = document.getElementById('nueva-pass').value;
      const confirmar = document.getElementById('confirmar-pass').value;

      if (nueva.length < 6) {
        msgError.textContent = 'La contraseña debe tener al menos 6 caracteres.';
        msgError.hidden = false;
        return;
      }
      if (nueva !== confirmar) {
        msgError.textContent = 'Las contraseñas no coinciden.';
        msgError.hidden = false;
        return;
      }

      btnGuardar.disabled = true;
      btnGuardar.textContent = 'Guardando…';

      const { error } = await supabase.auth.updateUser({ password: nueva });

      if (error) {
        msgError.textContent = 'No se pudo actualizar la contraseña. Intentá de nuevo.';
        msgError.hidden = false;
        btnGuardar.disabled = false;
        btnGuardar.textContent = 'Guardar contraseña';
      } else {
        await supabase.auth.signOut();
        mostrar('estado-exito');
      }
    });
  </script>
</body>
</html>
