<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Física I — UTN FRBA</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#003087" />
</head>
<body class="pagina-login">

  <main class="contenedor-login">
    <div class="login-card">
      <div class="login-logo">
        <div class="logo-icono">F<span>1</span></div>
        <h1>Física I</h1>
        <p class="login-subtitulo">UTN FRBA</p>
      </div>

      <form id="form-login" novalidate>
        <div class="campo">
          <label for="email">Correo electrónico</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="tulegajo@frba.utn.edu.ar"
            autocomplete="email"
            required
          />
        </div>

        <div class="campo">
          <label for="password">Contraseña</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          />
        </div>

        <div id="error-login" class="mensaje-error" hidden></div>

        <button type="submit" class="btn-primario" id="btn-ingresar">
          Ingresar
        </button>

        <a href="#" id="link-reset" class="link-reset">
          ¿Olvidaste tu contraseña?
        </a>
      </form>

      <div id="mensaje-reset" class="mensaje-info" hidden>
        Revisá tu correo para restablecer la contraseña.
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script>
    // Registrar service worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }

    const formLogin = document.getElementById('form-login');
    const errorLogin = document.getElementById('error-login');
    const btnIngresar = document.getElementById('btn-ingresar');
    const linkReset = document.getElementById('link-reset');
    const mensajeReset = document.getElementById('mensaje-reset');

    // Si ya hay sesión activa, redirigir directamente
    (async () => {
      const { data: { session } } = await supabase.auth.getSession();
      if (session) {
        await redirigirSegunRol(session.user.id);
      }
    })();

    async function redirigirSegunRol(userId) {
      const { data: perfil } = await supabase
        .from('usuarios')
        .select('rol')
        .eq('id', userId)
        .single();

      if (perfil?.rol === 'docente') {
        window.location.href = '/docente.html';
      } else {
        window.location.href = '/estudiante.html';
      }
    }

    formLogin.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorLogin.hidden = true;
      btnIngresar.disabled = true;
      btnIngresar.textContent = 'Ingresando…';

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      const { data, error } = await supabase.auth.signInWithPassword({ email, password });

      if (error) {
        errorLogin.textContent = 'Credenciales incorrectas. Verificá tu email y contraseña.';
        errorLogin.hidden = false;
        btnIngresar.disabled = false;
        btnIngresar.textContent = 'Ingresar';
        return;
      }

      await redirigirSegunRol(data.user.id);
    });

    linkReset.addEventListener('click', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();

      if (!email) {
        errorLogin.textContent = 'Ingresá tu correo antes de solicitar el restablecimiento.';
        errorLogin.hidden = false;
        return;
      }

      const { error } = await supabase.auth.resetPasswordForEmail(email);
      if (error) {
        errorLogin.textContent = 'No se pudo enviar el correo. Verificá la dirección.';
        errorLogin.hidden = false;
      } else {
        formLogin.hidden = true;
        mensajeReset.hidden = false;
      }
    });
  </script>
</body>
</html>
